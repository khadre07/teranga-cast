<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TerangaCast — Récepteur</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    video {
      width: 100%;
      max-height: 100vh;
      object-fit: contain;
    }
    #status {
      color: #fff;
      font-family: sans-serif;
      font-size: 1.2rem;
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 16px;
      border-radius: 8px;
      white-space: nowrap;
    }
    #fullscreen {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="status">Connexion en cours…</div>
  <video id="stream" autoplay playsinline></video>
  <button id="fullscreen" onclick="document.documentElement.requestFullscreen()">
    Plein écran
  </button>
  <script src="receiver.js"></script>
</body>
</html>
